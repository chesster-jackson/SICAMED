{% extends "base.html" %}

{% block contenido %}
<div class="row justify-content-center">
  <div class="col-lg-10 col-xl-8">
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-header bg-transparent border-0 pt-4 px-4">
        <div class="d-flex align-items-center gap-2">
          <i class="bi bi-calendar-event fs-3 text-danger"></i>
          <div>
            <h4 class="fw-semibold mb-0">Agendar Cita</h4>
            <p class="text-muted small mb-0">Programe una consulta médica para el adulto mayor</p>
          </div>
        </div>
      </div>
      <div class="card-body p-4">
        <form id="formAgendarCita">
          <div class="row g-3">
            <!-- Paciente -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Paciente</label>
              <select class="form-select form-select-lg rounded-3" id="pacienteCita" required>
                <option value="">Seleccionar paciente...</option>
                <!-- Los pacientes se cargarán dinámicamente -->
              </select>
            </div>
            
            <!-- Doctor -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Doctor</label>
              <select class="form-select form-select-lg rounded-3" id="doctorCita" required>
                <option value="">Seleccionar doctor...</option>
                <!-- Los doctores se cargarán dinámicamente -->
              </select>
            </div>
            
            <!-- Fecha -->
            <div class="col-md-4">
              <label class="form-label fw-semibold">Fecha</label>
              <input type="date" class="form-control form-control-lg rounded-3" id="fechaCita" required>
            </div>
            
            <!-- Hora -->
            <div class="col-md-4">
              <label class="form-label fw-semibold">Hora</label>
              <input type="time" class="form-control form-control-lg rounded-3" id="horaCita" required>
            </div>
            
            <!-- Duración -->
            <div class="col-md-4">
              <label class="form-label fw-semibold">Duración</label>
              <select class="form-select form-select-lg rounded-3" id="duracionCita">
                <option value="30">30 minutos</option>
                <option value="45">45 minutos</option>
                <option value="60" selected>1 hora</option>
                <option value="90">1.5 horas</option>
                <option value="120">2 horas</option>
              </select>
            </div>
            
            <!-- Observaciones -->
            <div class="col-12">
              <label class="form-label fw-semibold">Observaciones</label>
              <textarea class="form-control rounded-3" id="observacionesCita" rows="3" placeholder="Indicaciones especiales, síntomas, medicamentos actuales..."></textarea>
            </div>
          </div>

          <!-- Botones -->
          <div class="d-flex flex-wrap gap-3 mt-4 pt-3 border-top">
            <button type="submit" class="btn btn-danger btn-lg rounded-pill px-5">
              <i class="bi bi-calendar-plus me-2"></i>Agendar
            </button>
            <button type="reset" class="btn btn-outline-secondary btn-lg rounded-pill px-4">
              <i class="bi bi-arrow-counterclockwise me-2"></i>Cancelar
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-info btn-lg rounded-pill px-4">
              <i class="bi bi-house me-2"></i>Volver al Inicio
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}}
