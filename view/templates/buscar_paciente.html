{% extends "base.html" %}

{% block contenido %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-header bg-transparent border-0 pt-4 px-4">
        <div class="d-flex align-items-center gap-2">
          <i class="bi bi-search fs-3 text-info"></i>
          <div>
            <h4 class="fw-semibold mb-0">Buscar Paciente</h4>
            <p class="text-muted small mb-0">Ingrese la cédula para localizar al paciente</p>
          </div>
        </div>
      </div>
      <div class="card-body p-4">
        <form id="formBuscarPaciente">
          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label fw-semibold">Cédula / DNI</label>
              <input type="text" class="form-control form-control-lg rounded-3" id="cedulaBuscar" placeholder="Ingrese la cédula del paciente" required>
            </div>
            <div class="col-md-4 d-flex align-items-end">
              <button type="submit" class="btn btn-info btn-lg rounded-pill w-100 text-white">
                <i class="bi bi-search me-2"></i>Buscar
              </button>
            </div>
          </div>
        </form>
        
        <!-- Resultado de búsqueda -->
        <div class="mt-4" id="resultadoBusqueda">
          <div class="card border-0 bg-light rounded-4">
            <div class="card-body p-4">
              <div class="d-flex align-items-start gap-3">
                <div class="bg-success bg-opacity-10 rounded-3 p-3">
                  <i class="bi bi-person-circle fs-1 text-success"></i>
                </div>
                <div class="flex-grow-1">
                  <h5 class="fw-semibold mb-1" id="nombreMostrado">---</h5>
                  <div class="row g-2 mt-2">
                    <div class="col-md-6">
                      <p class="mb-1"><span class="text-muted">Cédula:</span> <strong id="cedulaMostrada">---</strong></p>
                      <p class="mb-1"><span class="text-muted">Edad:</span> <strong id="edadMostrada">---</strong></p>
                      <p class="mb-1"><span class="text-muted">Teléfono:</span> <strong id="telefonoMostrado">---</strong></p>
                    </div>
                    <div class="col-md-6">
                      <p class="mb-1"><span class="text-muted">Dirección:</span> <strong id="direccionMostrada">---</strong></p>
                      <p class="mb-1"><span class="text-muted">Correo:</span> <strong id="emailMostrado">---</strong></p>
                    </div>
                  </div>
                  <div class="mt-3 d-flex flex-wrap gap-2">
                    <a href="{{ url_for('actualizar_paciente') }}" class="btn btn-warning btn-sm rounded-pill text-white">
                      <i class="bi bi-pencil me-1"></i> Actualizar
                    </a>
                    <a href="{{ url_for('historial') }}" class="btn btn-secondary btn-sm rounded-pill text-white">
                      <i class="bi bi-clock-history me-1"></i> Ver historial
                    </a>
                    <a href="{{ url_for('citas') }}" class="btn btn-danger btn-sm rounded-pill">
                      <i class="bi bi-calendar-plus me-1"></i> Agendar cita
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
