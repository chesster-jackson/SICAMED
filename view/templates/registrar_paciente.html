{% extends "base.html" %}

{% block contenido %}
<div class="row justify-content-center">
  <div class="col-lg-10 col-xl-8">
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-header bg-transparent border-0 pt-4 px-4">
        <div class="d-flex align-items-center gap-2">
          <i class="bi bi-person-plus fs-3 text-success"></i>
          <div>
            <h4 class="fw-semibold mb-0">Registrar Paciente</h4>
            <p class="text-muted small mb-0">Ingrese los datos del adulto mayor</p>
          </div>
        </div>
      </div>
      <div class="card-body p-4">
        <form id="formRegistroPaciente">
          <div class="row g-3">
            <!-- Nombres -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Nombres</label>
              <input type="text" class="form-control form-control-lg rounded-3" id="nombres" placeholder="Ej: María Elena" required>
            </div>
            
            <!-- Apellidos -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Apellidos</label>
              <input type="text" class="form-control form-control-lg rounded-3" id="apellidos" placeholder="Ej: Pérez Gómez" required>
            </div>
            
            <!-- Edad -->
            <div class="col-md-3">
              <label class="form-label fw-semibold">Edad</label>
              <input type="number" class="form-control form-control-lg rounded-3" id="edad" placeholder="65" min="60" max="120" required>
            </div>
            
            <!-- Cédula -->
            <div class="col-md-9">
              <label class="form-label fw-semibold">Cédula / DNI</label>
              <input type="text" class="form-control form-control-lg rounded-3" id="cedula" placeholder="12345678" required>
            </div>
            
            <!-- Dirección -->
            <div class="col-12">
              <label class="form-label fw-semibold">Dirección</label>
              <input type="text" class="form-control form-control-lg rounded-3" id="direccion" placeholder="Calle, número, distrito" required>
            </div>
            
            <!-- Teléfono -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Teléfono</label>
              <input type="tel" class="form-control form-control-lg rounded-3" id="telefono" placeholder="987654321">
            </div>
            
            <!-- Correo -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Correo electrónico</label>
              <input type="email" class="form-control form-control-lg rounded-3" id="email" placeholder="paciente@email.com">
            </div>
          </div>

          <!-- Botones -->
          <div class="d-flex flex-wrap gap-3 mt-4 pt-3 border-top">
            <button type="submit" class="btn btn-success btn-lg rounded-pill px-5">
              <i class="bi bi-check-circle me-2"></i>Guardar
            </button>
            <button type="reset" class="btn btn-outline-secondary btn-lg rounded-pill px-4">
              <i class="bi bi-arrow-counterclockwise me-2"></i>Cancelar
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-info btn-lg rounded-pill px-4">
              <i class="bi bi-house me-2"></i>Volver al Inicio
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
