{% extends "base.html" %}

{% block contenido %}
<div class="row justify-content-center">
  <div class="col-lg-10 col-xl-8">
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-header bg-transparent border-0 pt-4 px-4">
        <div class="d-flex align-items-center gap-2">
          <i class="bi bi-person-badge fs-3 text-primary"></i>
          <div>
            <h4 class="fw-semibold mb-0">Registrar Doctor</h4>
            <p class="text-muted small mb-0">Ingrese los datos del profesional médico</p>
          </div>
        </div>
      </div>
      <div class="card-body p-4">
        <form id="formRegistroDoctor">
          <div class="row g-3">
            <!-- Nombres -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Nombres</label>
              <input type="text" class="form-control form-control-lg rounded-3" id="nombreDoctor" placeholder="Ej: Carlos" required>
            </div>
            
            <!-- Apellidos -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Apellidos</label>
              <input type="text" class="form-control form-control-lg rounded-3" id="apellidoDoctor" placeholder="Ej: Mendoza Ríos" required>
            </div>
            
            <!-- Edad -->
            <div class="col-md-3">
              <label class="form-label fw-semibold">Edad</label>
              <input type="number" class="form-control form-control-lg rounded-3" id="edadDoctor" placeholder="35" min="25" max="80" required>
            </div>
            
            <!-- Cédula -->
            <div class="col-md-4">
              <label class="form-label fw-semibold">Cédula</label>
              <input type="text" class="form-control form-control-lg rounded-3" id="cedulaDoctor" placeholder="12345678" required>
            </div>
            
            <!-- ID Doctor -->
            <div class="col-md-5">
              <label class="form-label fw-semibold">ID del Doctor</label>
              <input type="text" class="form-control form-control-lg rounded-3" id="idDoctor" placeholder="CMP-12345" required>
            </div>
            
            <!-- Especialidad -->
            <div class="col-12">
              <label class="form-label fw-semibold">Especialidad</label>
              <select class="form-select form-select-lg rounded-3" id="especialidad" required>
                <option value="">Seleccionar especialidad...</option>
                <option value="Geriatría">Geriatría</option>
                <option value="Medicina Interna">Medicina Interna</option>
                <option value="Neurología">Neurología</option>
                <option value="Cardiología">Cardiología</option>
                <option value="Reumatología">Reumatología</option>
                <option value="Fisiatría">Fisiatría</option>
                <option value="Nutrición Clínica">Nutrición Clínica</option>
                <option value="Psicogeriatría">Psicogeriatría</option>
              </select>
            </div>
            
            <!-- Teléfono -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Teléfono</label>
              <input type="tel" class="form-control form-control-lg rounded-3" id="telefonoDoctor" placeholder="987654321">
            </div>
            
            <!-- Correo -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Correo electrónico</label>
              <input type="email" class="form-control form-control-lg rounded-3" id="emailDoctor" placeholder="doctor@minsa.gob.pe">
            </div>
          </div>

          <!-- Botones -->
          <div class="d-flex flex-wrap gap-3 mt-4 pt-3 border-top">
            <button type="submit" class="btn btn-primary btn-lg rounded-pill px-5">
              <i class="bi bi-check-circle me-2"></i>Guardar
            </button>
            <button type="reset" class="btn btn-outline-secondary btn-lg rounded-pill px-4">
              <i class="bi bi-arrow-counterclockwise me-2"></i>Cancelar
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-info btn-lg rounded-pill px-4">
              <i class="bi bi-house me-2"></i>Volver al Inicio
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
