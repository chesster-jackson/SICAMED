{% extends "base.html" %}

{% block contenido %}
<div class="row justify-content-center">
  <div class="col-lg-10 col-xl-8">
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-header bg-transparent border-0 pt-4 px-4">
        <div class="d-flex align-items-center gap-2">
          <i class="bi bi-pencil-square fs-3 text-warning"></i>
          <div>
            <h4 class="fw-semibold mb-0">Actualizar Paciente</h4>
            <p class="text-muted small mb-0">Primero busque al paciente por su cédula</p>
          </div>
        </div>
      </div>
      <div class="card-body p-4">
        <!-- Buscador -->
        <form id="formBuscarActualizar">
          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label fw-semibold">Cédula del paciente</label>
              <input type="text" class="form-control form-control-lg rounded-3" id="cedulaActualizar" placeholder="Ingrese la cédula para buscar" required>
            </div>
            <div class="col-md-4 d-flex align-items-end">
              <button type="submit" class="btn btn-warning btn-lg rounded-pill w-100 text-white">
                <i class="bi bi-search me-2"></i>Buscar
              </button>
            </div>
          </div>
        </form>

        <!-- Formulario editable -->
        <div class="mt-4" id="formularioEditable">
          <div class="alert alert-info rounded-3">
            <i class="bi bi-info-circle me-2"></i>
            <strong>Paciente encontrado:</strong> <span id="nombrePacienteEdit">---</span> · DNI: <span id="cedulaPacienteEdit">---</span>
          </div>
          <form id="formActualizarPaciente">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Nombres</label>
                <input type="text" class="form-control form-control-lg rounded-3" id="nombresEdit" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Apellidos</label>
                <input type="text" class="form-control form-control-lg rounded-3" id="apellidosEdit" required>
              </div>
              <div class="col-md-3">
                <label class="form-label fw-semibold">Edad</label>
                <input type="number" class="form-control form-control-lg rounded-3" id="edadEdit" min="60" max="120" required>
              </div>
              <div class="col-md-9">
                <label class="form-label fw-semibold">Cédula</label>
                <input type="text" class="form-control form-control-lg rounded-3" id="cedulaEdit" readonly>
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Dirección</label>
                <input type="text" class="form-control form-control-lg rounded-3" id="direccionEdit" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Teléfono</label>
                <input type="tel" class="form-control form-control-lg rounded-3" id="telefonoEdit">
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Correo</label>
                <input type="email" class="form-control form-control-lg rounded-3" id="emailEdit">
              </div>
            </div>
            <div class="d-flex flex-wrap gap-3 mt-4 pt-3 border-top">
              <button type="submit" class="btn btn-warning btn-lg rounded-pill px-5 text-white">
                <i class="bi bi-check-circle me-2"></i>Actualizar
              </button>
              <a href="{{ url_for('index') }}" class="btn btn-outline-info btn-lg rounded-pill px-4">
                <i class="bi bi-house me-2"></i>Volver al Inicio
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
