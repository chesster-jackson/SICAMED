<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Gestión del Adulto Mayor · MINSA</title>
  <!-- Bootstrap 5 + Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- CSS personalizado -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header-sistema shadow-sm">
    <div class="container d-flex flex-wrap align-items-center justify-content-between py-2">
      <div class="d-flex align-items-center gap-2">
        <div class="logo-hospital bg-white rounded-circle d-flex align-items-center justify-content-center" style="width: 48px; height: 48px;">
          <i class="bi bi-hospital fs-2 text-primary" style="color: #1a6b4a !important;"></i>
        </div>
        <div>
          <h1 class="h5 fw-semibold mb-0" style="color: #1a3b2e;">Sistema de Gestión del Adulto Mayor</h1>
          <span class="badge bg-success-subtle text-success-emphasis fw-normal fs-7">Centro de Salud · MINSA</span>
        </div>
      </div>
      <div class="d-flex align-items-center gap-3">
        <span class="text-muted small d-none d-sm-inline"><i class="bi bi-person-circle me-1"></i> Dr. Vega</span>
        <a href="#" class="btn btn-outline-success btn-sm rounded-pill px-3"><i class="bi bi-box-arrow-right me-1"></i>Salir</a>
      </div>
    </div>
  </header>

  <!-- ===== NAVEGACIÓN PRINCIPAL ===== -->
  <nav class="navbar navbar-expand-lg bg-white border-bottom border-light shadow-sm py-0">
    <div class="container">
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPrincipal">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarPrincipal">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}"><i class="bi bi-house-door me-1"></i>Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('registrar_paciente') }}"><i class="bi bi-person-plus me-1"></i>Registrar paciente</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('registrar_doctor') }}"><i class="bi bi-person-badge me-1"></i>Registrar doctor</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('buscar_paciente') }}"><i class="bi bi-search me-1"></i>Buscar paciente</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('actualizar_paciente') }}"><i class="bi bi-pencil-square me-1"></i>Actualizar</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('historial') }}"><i class="bi bi-clock-history me-1"></i>Historial</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('citas') }}"><i class="bi bi-calendar-event me-1"></i>Citas</a></li>
        </ul>
        <span class="navbar-text text-muted small d-none d-md-block">
          <i class="bi bi-database me-1"></i> v1.0
        </span>
      </div>
    </div>
  </nav>

  <!-- ===== CONTENIDO DINÁMICO ===== -->
  <main class="py-4">
    <div class="container">
      {% block contenido %}{% endblock %}
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer-sistema bg-white border-top border-light mt-5 py-3">
    <div class="container d-flex flex-wrap justify-content-between align-items-center">
      <span class="text-muted small">&copy; 2026 · Sistema de Gestión del Adulto Mayor</span>
      <span class="text-muted small"><i class="bi bi-code-square me-1"></i> Versión 1.0 · MINSA</span>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <!-- JavaScript personalizado -->
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
